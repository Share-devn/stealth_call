<svg xmlns="http://www.w3.org/2000/svg" width="750" height="420" viewBox="0 0 750 420">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>

  <rect width="750" height="420" fill="url(#bg2)" rx="10"/>

  <text x="375" y="30" font-family="Segoe UI,sans-serif" font-size="15" font-weight="bold" fill="#8b949e" text-anchor="middle">SYSCALL INVOCATION FLOW</text>

  <!-- Step boxes -->
  <!-- 1 -->
  <rect x="20" y="55" width="160" height="50" rx="8" fill="#1f6feb" opacity="0.2" stroke="#1f6feb" stroke-width="1"/>
  <text x="100" y="75" font-family="Consolas,monospace" font-size="11" fill="#58a6ff" text-anchor="middle">sc::invoke()</text>
  <text x="100" y="93" font-family="Segoe UI,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">hash lookup in static_map</text>

  <!-- arrow -->
  <line x1="180" y1="80" x2="210" y2="80" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#8b949e"/></marker></defs>

  <!-- 2 -->
  <rect x="215" y="55" width="160" height="50" rx="8" fill="#8957e5" opacity="0.2" stroke="#8957e5" stroke-width="1"/>
  <text x="295" y="75" font-family="Consolas,monospace" font-size="11" fill="#bc8cff" text-anchor="middle">get_scratch_page()</text>
  <text x="295" y="93" font-family="Segoe UI,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">per-thread RW page</text>

  <line x1="375" y1="80" x2="405" y2="80" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3 -->
  <rect x="410" y="55" width="160" height="50" rx="8" fill="#da3633" opacity="0.2" stroke="#da3633" stroke-width="1"/>
  <text x="490" y="75" font-family="Consolas,monospace" font-size="11" fill="#ff7b72" text-anchor="middle">emit_stub()</text>
  <text x="490" y="93" font-family="Segoe UI,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">dynamic polymorphic gen</text>

  <line x1="570" y1="80" x2="600" y2="80" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4 -->
  <rect x="605" y="55" width="125" height="50" rx="8" fill="#1f6feb" opacity="0.2" stroke="#1f6feb" stroke-width="1"/>
  <text x="667" y="75" font-family="Consolas,monospace" font-size="11" fill="#58a6ff" text-anchor="middle">RW → RX</text>
  <text x="667" y="93" font-family="Segoe UI,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">NtProtectVirtualMemory</text>

  <!-- Down arrow -->
  <line x1="667" y1="105" x2="667" y2="145" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 5 - call -->
  <rect x="575" y="150" width="185" height="50" rx="8" fill="#238636" opacity="0.25" stroke="#3fb950" stroke-width="1.5"/>
  <text x="667" y="170" font-family="Consolas,monospace" font-size="12" fill="#3fb950" text-anchor="middle" font-weight="bold">CALL stub</text>
  <text x="667" y="188" font-family="Segoe UI,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">jmp → ntdll syscall;ret gadget</text>

  <!-- Down arrow -->
  <line x1="667" y1="200" x2="667" y2="240" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 6 -->
  <rect x="605" y="245" width="125" height="50" rx="8" fill="#8957e5" opacity="0.2" stroke="#8957e5" stroke-width="1"/>
  <text x="667" y="265" font-family="Consolas,monospace" font-size="11" fill="#bc8cff" text-anchor="middle">RX → RW</text>
  <text x="667" y="283" font-family="Segoe UI,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">restore writable</text>

  <line x1="605" y1="270" x2="575" y2="270" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 7 -->
  <rect x="415" y="245" width="155" height="50" rx="8" fill="#da3633" opacity="0.2" stroke="#da3633" stroke-width="1"/>
  <text x="492" y="265" font-family="Consolas,monospace" font-size="11" fill="#ff7b72" text-anchor="middle">memset(stub, 0)</text>
  <text x="492" y="283" font-family="Segoe UI,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">anti-dump wipe</text>

  <!-- Stub detail box -->
  <rect x="20" y="140" width="520" height="165" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="35" y="165" font-family="Segoe UI,sans-serif" font-size="12" fill="#8b949e" font-weight="bold">GENERATED STUB (unique per call)</text>

  <text x="35" y="190" font-family="Consolas,monospace" font-size="10" fill="#484f58">[random junk x0-3]</text>
  <text x="35" y="208" font-family="Consolas,monospace" font-size="10" fill="#58a6ff">mov r10, rcx          </text>
  <text x="230" y="208" font-family="Consolas,monospace" font-size="9" fill="#484f58">; or push rcx; pop r10</text>
  <text x="35" y="226" font-family="Consolas,monospace" font-size="10" fill="#484f58">[random junk x0-2]</text>
  <text x="35" y="244" font-family="Consolas,monospace" font-size="10" fill="#ff7b72">mov eax, NUM ^ KEY    </text>
  <text x="230" y="244" font-family="Consolas,monospace" font-size="9" fill="#484f58">; XOR'd syscall number</text>
  <text x="35" y="262" font-family="Consolas,monospace" font-size="10" fill="#ff7b72">xor eax, KEY          </text>
  <text x="230" y="262" font-family="Consolas,monospace" font-size="9" fill="#484f58">; runtime decrypt</text>
  <text x="35" y="280" font-family="Consolas,monospace" font-size="10" fill="#484f58">[random junk x0-1]</text>
  <text x="35" y="298" font-family="Consolas,monospace" font-size="10" fill="#3fb950">jmp [rip]  → ntdll!syscall;ret</text>
  <text x="305" y="298" font-family="Consolas,monospace" font-size="9" fill="#484f58">; indirect, RIP stays in ntdll</text>

  <!-- VEH box -->
  <rect x="20" y="325" width="340" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="35" y="350" font-family="Segoe UI,sans-serif" font-size="12" fill="#8b949e" font-weight="bold">VEH ANTI-BREAKPOINT</text>
  <text x="35" y="372" font-family="Consolas,monospace" font-size="10" fill="#bc8cff">INT3 → restore byte → set TF → continue</text>
  <text x="35" y="390" font-family="Consolas,monospace" font-size="10" fill="#bc8cff">SINGLE_STEP → re-insert 0xCC → continue</text>

  <!-- Stats box -->
  <rect x="380" y="325" width="350" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="395" y="350" font-family="Segoe UI,sans-serif" font-size="12" fill="#8b949e" font-weight="bold">BINARY PROFILE</text>
  <text x="395" y="372" font-family="Consolas,monospace" font-size="10" fill="#58a6ff">IAT: 0  |  CRT: none  |  Size: ~19KB</text>
  <text x="395" y="390" font-family="Consolas,monospace" font-size="10" fill="#58a6ff">RWX: never  |  Strings: XOR'd  |  977 syscalls</text>
</svg>
